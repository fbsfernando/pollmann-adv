services:
  juridicodb:
    image: postgres:16-alpine
    container_name: juridico-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: juridico
      POSTGRES_PASSWORD: "JuridicoAdv2026"
      POSTGRES_DB: juridico_adv
    volumes:
      - pgdata_v6:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U juridico -d juridico_adv"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: juridico-app
    restart: unless-stopped
    depends_on:
      juridicodb:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://juridico:JuridicoAdv2026@juridicodb:5432/juridico_adv?schema=public"
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      NEXTAUTH_URL: ${AUTH_URL}
      PIPELINE_ARCHIVE_DIR: /app/storage/archive
      EPROC_TRIBUNAL: ${EPROC_TRIBUNAL}
      EPROC_TJSC_USER: ${EPROC_TJSC_USER}
      EPROC_TJSC_PASSWORD: "$$Pollmann2025"
      EPROC_TJSC_TOTP_SEED: ${EPROC_TJSC_TOTP_SEED}
      EPROC_TJRS_USER: ${EPROC_TJRS_USER}
      EPROC_TJRS_PASSWORD: "$$Pollmann2024"
      EPROC_TJRS_TOTP_SEED: ${EPROC_TJRS_TOTP_SEED}
    volumes:
      - archive:/app/storage/archive
    expose:
      - "3000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.pollmann-adv.entrypoints=http
      - "traefik.http.routers.pollmann-adv.rule=Host(`q4oogkwgg800ccoc480kw48c.78.47.75.193.sslip.io`)"
      - traefik.http.routers.pollmann-adv.middlewares=redirect-to-https
      - traefik.http.services.pollmann-adv.loadbalancer.server.port=3000
      - traefik.docker.network=coolify
      - traefik.http.routers.pollmann-adv-https.entrypoints=https
      - "traefik.http.routers.pollmann-adv-https.rule=Host(`q4oogkwgg800ccoc480kw48c.78.47.75.193.sslip.io`)"
      - traefik.http.routers.pollmann-adv-https.tls=true
      - traefik.http.routers.pollmann-adv-https.tls.certresolver=letsencrypt
      - traefik.http.routers.pollmann-adv-https.service=pollmann-adv
    networks:
      - internal
      - coolify

volumes:
  pgdata_v6:
  archive:

networks:
  internal:
    internal: true
  coolify:
    external: true
